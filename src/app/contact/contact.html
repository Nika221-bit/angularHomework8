<div class="contact-container">
  <h1>დაგვეკონტაქტე</h1>

  <div class="contact-content">
    <section class="contact-info">
      <h2>საკონტაქტო ინფორმაცია</h2>
      <div class="info-item">
        <strong>მისამართი:</strong> თბილისი, რუსთაველის გამზირი 1
      </div>
      <div class="info-item">
        <strong>ტელეფონი:</strong> +995 32 123 45 67
      </div>
      <div class="info-item">
        <strong>ელ-ფოსტა:</strong> info@hotel.ge
      </div>
      <div class="info-item">
        <strong>სამუშაო საათები:</strong> 24/7
      </div>
    </section>

    <section class="contact-form">
      <h2>მოგვწერეთ</h2>
      <form>
        <div class="form-group">
          <label for="name">სახელი</label>
          <input type="text" id="name" name="name" required>
        </div>

        <div class="form-group">
          <label for="email">ელ-ფოსტა</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
          <label for="phone">ტელეფონი</label>
          <input type="tel" id="phone" name="phone">
        </div>

        <div class="form-group">
          <label for="message">შეტყობინება</label>
          <textarea id="message" name="message" rows="5" required></textarea>
        </div>

        <button type="submit" class="submit-btn">გაგზავნა</button>
      </form>
    </section>
  </div>
</div>
